<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>100 Before</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ─── RESET & BASE ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Space Grotesk',sans-serif;background:#000;color:#e0e0e0;min-height:100vh;overflow:hidden}

/* ─── ANIMATED BACKGROUND ──────────────────────────────────── */
/* Login: pure black, no effects. App: very subtle orbs only. */
.bg-wrap{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(110px)}
.orb-app1{width:600px;height:600px;background:radial-gradient(circle,rgba(60,30,140,0.07),transparent 70%);top:-200px;right:-100px;animation:orbFloat1 12s ease-in-out infinite alternate}
.orb-app2{width:400px;height:400px;background:radial-gradient(circle,rgba(0,120,100,0.05),transparent 70%);bottom:-100px;left:30%;animation:orbFloat2 15s ease-in-out infinite alternate}
@keyframes orbFloat1{from{transform:translate(0,0) scale(1)}to{transform:translate(50px,35px) scale(1.08)}}
@keyframes orbFloat2{from{transform:translate(0,0) scale(1)}to{transform:translate(-40px,-30px) scale(1.06)}}

/* ─── KEYFRAMES ────────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)}}
@keyframes glowPulse{0%{opacity:0;transform:scale(.84)}60%{opacity:1;transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popCheck{0%{transform:scale(0)}65%{transform:scale(1.25)}100%{transform:scale(1)}}
@keyframes goalSlideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ─── LOGIN PAGE ───────────────────────────────────────────── */
.login-page{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .5s ease}
/* Two-panel card */
.login-card{position:relative;z-index:1;width:92%;max-width:800px;background:#111;border:1px solid #1e1e1e;border-radius:20px;display:flex;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.85);animation:scaleIn .45s ease}
.login-card.shake{animation:shake .45s ease}
/* Left branding panel */
.login-left{width:260px;flex-shrink:0;background:#0d0d0d;padding:48px 36px;display:flex;flex-direction:column;justify-content:center;align-items:center;border-right:1px solid #1a1a1a}
.login-brand-wrap{display:flex;align-items:center;gap:12px}
.login-big-num{font-family:'Space Grotesk',sans-serif;font-size:110px;font-weight:700;color:#fff;letter-spacing:-8px;line-height:1}
.login-vert{writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);font-size:10px;font-weight:500;letter-spacing:5px;color:#333;text-transform:uppercase}
/* Right form panel */
.login-right{flex:1;padding:52px 50px;display:flex;flex-direction:column;justify-content:space-between;gap:0}
.login-heading{font-size:26px;font-weight:700;color:#fff;letter-spacing:-.5px;margin-bottom:8px}
.login-sub{font-size:14px;color:#777;font-weight:300;line-height:1.5;margin-bottom:36px}
.login-form{display:flex;flex-direction:column;gap:20px}
.login-field{display:flex;flex-direction:column;gap:7px}
.login-field label{font-size:11px;color:#666;font-weight:600;letter-spacing:1.8px;text-transform:uppercase}
.login-field input{background:#0a0a0a;border:1px solid #222;border-radius:10px;padding:13px 16px;color:#f0f0f0;font-family:'Space Grotesk',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
.login-field input:focus{border-color:#3a3a3a}
.login-field input::placeholder{color:#2e2e2e}
.login-error{font-size:13px;color:#e05a5a;animation:fadeUp .25s ease;margin-top:-6px}
.login-btn{margin-top:4px;padding:14px;background:#1c1c1c;color:#e0e0e0;border:1px solid #2a2a2a;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;min-height:50px}
.login-btn:hover:not(:disabled){background:#242424;border-color:#333;color:#fff}
.login-btn:active{transform:scale(.99)}
.login-btn:disabled{opacity:.55;cursor:default}
.login-footer-txt{font-size:12px;color:#2e2e2e;margin-top:28px}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.15);border-top-color:#e0e0e0;border-radius:50%;animation:spin .65s linear infinite}

/* ─── SETUP PAGE ───────────────────────────────────────────── */
.setup-page{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .4s ease}
.setup-card{position:relative;z-index:1;width:90%;max-width:500px;background:rgba(255,255,255,0.04);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.1);border-radius:26px;padding:52px 44px;display:flex;flex-direction:column;align-items:center;gap:22px;text-align:center;animation:scaleIn .5s ease}
.setup-big-num{font-family:'Space Grotesk',sans-serif;font-size:88px;font-weight:700;color:#fff;letter-spacing:-5px;line-height:1;animation:glowPulse 1.2s ease both}
.setup-title{font-size:30px;font-weight:700;color:#fff;letter-spacing:-1px}
.setup-sub{font-size:15px;color:#999;font-weight:300;line-height:1.6}
.setup-row{display:flex;align-items:center;width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:14px;overflow:hidden}
.setup-pre{padding:15px 18px;font-size:16px;color:#888;white-space:nowrap;border-right:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);flex-shrink:0}
.setup-inp{flex:1;padding:15px 18px;background:transparent;border:none;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:16px;outline:none}
.setup-inp::placeholder{color:#3a3a3a}

/* ─── INTRO ────────────────────────────────────────────────── */
.intro{position:fixed;inset:0;background:#080808;display:flex;align-items:center;justify-content:center;z-index:1000;cursor:pointer;animation:fadeIn .4s ease}
.intro-content{display:flex;flex-direction:column;align-items:center;gap:10px}
.intro-num{font-family:'Space Grotesk',sans-serif;font-size:clamp(80px,18vw,165px);font-weight:700;color:#fff;letter-spacing:-7px;line-height:1;animation:glowPulse 1.2s ease forwards}
.intro-word{font-size:clamp(14px,2vw,21px);font-weight:300;letter-spacing:7px;color:#aaa;text-transform:uppercase;animation:slideUp .8s .45s ease both;text-align:center;max-width:82vw}
.intro-skip{position:absolute;bottom:34px;font-size:12px;color:#444;letter-spacing:2px;text-transform:uppercase;animation:slideUp .8s 1.1s ease both}

/* ─── APP SHELL ────────────────────────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden;position:relative;animation:fadeIn .6s ease}

/* ─── SIDEBAR ──────────────────────────────────────────────── */
.sidebar{width:244px;flex-shrink:0;background:rgba(12,12,12,0.92);backdrop-filter:blur(12px);border-right:1px solid #1c1c1c;display:flex;flex-direction:column;padding:34px 0 28px;z-index:10;position:relative}
.sidebar-logo{padding:0 26px 42px}
.logo-num{font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:700;color:#fff;line-height:1;letter-spacing:-2.5px;display:block}
.logo-txt{font-size:11px;font-weight:400;letter-spacing:5px;color:#777;text-transform:uppercase;margin-top:5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-nav{display:flex;flex-direction:column;gap:4px;flex:1;padding:0 14px}
.nav-btn{display:flex;align-items:center;gap:14px;padding:13px 15px;border:none;background:transparent;color:#888;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:400;border-radius:12px;cursor:pointer;transition:all .2s ease;text-align:left;width:100%}
.nav-btn svg{flex-shrink:0}
.nav-btn:hover{background:#161616;color:#ddd}
.nav-btn.active{background:#1e1e1e;color:#fff;font-weight:500}
.sidebar-footer{padding:24px 26px 0;display:flex;flex-direction:column;align-items:center;gap:8px;border-top:1px solid #1a1a1a}
.ring-wrap{position:relative;width:66px;height:66px;display:flex;align-items:center;justify-content:center}
.ring-svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:#222;stroke-width:3.5}
.ring-fill{fill:none;stroke:#fff;stroke-width:3.5;stroke-linecap:round;stroke-dasharray:150.8;transition:stroke-dashoffset .9s cubic-bezier(.4,0,.2,1)}
.ring-lbl{position:absolute;font-family:'Space Grotesk',sans-serif;font-size:12px;color:#fff;font-weight:700}

/* ─── MAIN ─────────────────────────────────────────────────── */

.main::-webkit-scrollbar{width:3px}
.main::-webkit-scrollbar-track{background:transparent}

/* ─── VIEW ─────────────────────────────────────────────────── */
.view-wrap{animation:fadeUp .35s ease}
.view-header{margin-bottom:50px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:20px}
.view-title{font-size:46px;font-weight:700;color:#fff;letter-spacing:-2.5px;line-height:1}
.view-sub{font-size:15px;color:#999;margin-top:10px;font-weight:300}
.before-badge{display:inline-flex;align-items:center;gap:8px;background:#161616;border:1px solid #262626;border-radius:20px;padding:7px 16px;font-size:13px;color:#aaa;margin-top:14px;cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif;border:none}
.before-badge:hover{background:#1e1e1e;color:#e0e0e0}
.before-badge strong{color:#fff}
.header-btns{display:flex;gap:10px;flex-wrap:wrap;padding-top:10px}

/* ─── STATS ────────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:58px}
.stat-card{background:#111;border:1px solid #1e1e1e;border-radius:18px;padding:30px 26px;display:flex;flex-direction:column;gap:10px;transition:border-color .2s,transform .25s;animation:fadeUp .4s ease both}
.stat-card:hover{border-color:#2a2a2a;transform:translateY(-3px)}
.stat-val{font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:700;color:#fff;letter-spacing:-2.5px;line-height:1}
.stat-lbl{font-size:13px;color:#888;letter-spacing:1px;text-transform:uppercase;font-weight:500}
.section-title{font-size:13px;font-weight:600;color:#666;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:20px}

/* ─── GOAL LIST ─────────────────────────────────────────────── */
.goal-list{display:flex;flex-direction:column;gap:8px}
.goal-item{background:#0f0f0f;border:1px solid #1e1e1e;border-radius:16px;padding:18px 22px;display:flex;align-items:center;gap:16px;transition:border-color .2s,background .2s;animation:goalSlideIn .35s ease both}
.goal-item:hover{border-color:#2b2b2b;background:#121212}
.goal-item.done{opacity:.42}
.goal-item.drag-over{border-color:#3a3a3a;background:#141414;transform:scale(1.006)}
.drag-handle{cursor:grab;color:#3a3a3a;flex-shrink:0;display:flex;align-items:center;transition:color .2s}
.drag-handle:hover{color:#777}
.drag-handle:active{cursor:grabbing}
.goal-check{width:24px;height:24px;border:1.5px solid #333;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .25s;cursor:pointer;background:transparent}
.goal-check:hover{border-color:#555}
.goal-item.done .goal-check{background:#e8e8e8;border-color:#e8e8e8;animation:popCheck .3s ease}
.goal-text{flex:1;min-width:0;cursor:pointer}
.goal-title-txt{font-size:16px;font-weight:500;color:#f0f0f0;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.goal-item.done .goal-title-txt{text-decoration:line-through;color:#666}
.goal-desc-txt{font-size:14px;color:#aaa;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.goal-item.done .goal-desc-txt{color:#555}
.goal-due{font-size:12px;color:#888;margin-top:5px}
.goal-due.overdue{color:#d9615a}
.goal-cat-tag{font-size:12px;padding:5px 13px;border-radius:20px;background:#161616;color:#aaa;border:1px solid #222;white-space:nowrap}
.goal-num{font-family:'Space Grotesk',sans-serif;font-size:12px;color:#444;min-width:36px;text-align:right;flex-shrink:0;font-weight:600}
.goal-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;opacity:0;transition:opacity .18s}
.goal-item:hover .goal-actions{opacity:1}
.goal-action-btn{width:32px;height:32px;border:1px solid #222;border-radius:8px;background:#111;color:#aaa;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s}
.goal-action-btn:hover{background:#1c1c1c;color:#fff;border-color:#333}
.goal-action-btn.del:hover{background:#1f0d0d;color:#e05a5a;border-color:#3d1818}

/* ─── FILTER BAR ────────────────────────────────────────────── */
.filter-bar{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:9px 20px;border:1px solid #222;border-radius:20px;background:transparent;color:#aaa;font-family:'Space Grotesk',sans-serif;font-size:14px;cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:#333;color:#ddd}
.filter-btn.active{background:#e8e8e8;color:#000;border-color:#e8e8e8;font-weight:600}
.filter-sep{width:1px;height:28px;background:#222;flex-shrink:0}
.filter-select{padding:9px 16px;border:1px solid #222;border-radius:20px;background:#080808;color:#aaa;font-family:'Space Grotesk',sans-serif;font-size:14px;cursor:pointer;outline:none;transition:all .2s}
.filter-select:hover{border-color:#333;color:#ddd}
.filter-select option{background:#111;color:#f0f0f0}

/* ─── FORM ─────────────────────────────────────────────────── */
.form-card{max-width:560px;background:#0f0f0f;border:1px solid #1e1e1e;border-radius:22px;padding:46px;display:flex;flex-direction:column;gap:24px;animation:fadeUp .4s ease}
.form-group{display:flex;flex-direction:column;gap:9px}
.form-group label{font-size:13px;color:#bbb;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.opt{color:#555;font-weight:300;text-transform:none;letter-spacing:0;font-size:13px}
.form-group input,.form-group textarea,.form-group select{background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:15px 18px;color:#f0f0f0;font-family:'Space Grotesk',sans-serif;font-size:16px;outline:none;transition:border-color .2s;resize:none;width:100%}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:#3a3a3a}
.form-group select option{background:#111;color:#f0f0f0}
.form-group input::placeholder,.form-group textarea::placeholder{color:#3a3a3a}
.form-note{font-size:14px;color:#aaa;text-align:center;animation:fadeUp .25s ease}
.form-note.err{color:#e05a5a}
.form-note.ok{color:#5ab87a}

/* ─── BUTTONS ───────────────────────────────────────────────── */
.btn-primary{padding:17px 30px;background:#e8e8e8;color:#080808;border:none;border-radius:12px;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s ease;letter-spacing:.2px}
.btn-primary:hover{background:#fff;transform:translateY(-1px);box-shadow:0 8px 24px rgba(255,255,255,0.1)}
.btn-primary:active{transform:translateY(0)}
.btn-primary.full{width:100%}
.btn-secondary{padding:11px 20px;background:transparent;color:#ccc;border:1px solid #262626;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-secondary:hover{border-color:#3a3a3a;color:#fff;background:#161616}

/* ─── EMPTY STATE ───────────────────────────────────────────── */
.empty-state{text-align:center;padding:80px 20px;animation:fadeUp .4s ease}
.empty-state p{font-size:16px;color:#666}
.empty-hint{font-size:14px;color:#444;padding:24px 0}

/* ─── MODAL ─────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(6px);animation:fadeIn .2s ease}
.modal-card{background:#111;border:1px solid #252525;border-radius:22px;padding:46px;width:90%;max-width:540px;display:flex;flex-direction:column;gap:22px;max-height:90vh;overflow-y:auto;animation:scaleIn .25s ease}
.modal-header{display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.5px}
.modal-close{width:38px;height:38px;border:1px solid #2a2a2a;border-radius:50%;background:transparent;color:#aaa;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;line-height:1}
.modal-close:hover{background:#1c1c1c;color:#fff}

/* ─── TOAST ─────────────────────────────────────────────────── */
.toast{position:fixed;bottom:34px;left:50%;transform:translateX(-50%) translateY(24px);background:#1c1c1c;border:1px solid #2a2a2a;color:#f0f0f0;padding:15px 24px;border-radius:14px;font-size:15px;display:flex;align-items:center;gap:18px;opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);z-index:900;white-space:nowrap;pointer-events:none;font-family:'Space Grotesk',sans-serif;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all}
.toast-undo{background:transparent;border:1px solid #3a3a3a;color:#fff;padding:7px 16px;border-radius:8px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;transition:all .2s}
.toast-undo:hover{background:#2a2a2a}

/* ─── RESPONSIVE ────────────────────────────────────────────── */
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}.main{padding:36px 28px}}
@media(max-width:640px){
  .sidebar{width:68px}
  .logo-txt,.nav-btn span,.sidebar-meta{display:none}
  .logo-num{font-size:24px}
  .nav-btn{justify-content:center;padding:14px}
  .main{padding:28px 18px}
  .view-title{font-size:32px}
  .header-btns{flex-direction:column;width:100%}
  .login-card,.setup-card{padding:40px 28px}

}

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

/* ─── CONSTANTS ──────────────────────────────────────────────── */
const USERS = [{ username: 'Pranav', password: '123' }];
const CATS  = ['Adventure','Travel','Learning','Creative','Health','Social','Career','Other'];

/* ─── UTILS ──────────────────────────────────────────────────── */
const saveGoals = g  => localStorage.setItem('100before', JSON.stringify(g));
const saveLabel = lb => localStorage.setItem('100before_label', lb);

function formatDue(due) {
  if (!due) return null;
  const d     = new Date(due + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff  = Math.round((d - today) / 86400000);
  const lbl   = d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const tag   = diff < 0 ? ` · ${Math.abs(diff)}d overdue` : diff === 0 ? ' · Due today' : diff <= 7 ? ` · ${diff}d left` : '';
  return { text: lbl + tag, overdue: diff < 0 };
}

/* ─── useCountUp ─────────────────────────────────────────────── */
function useCountUp(target) {
  const [val, setVal] = useState(0);
  const prev = useRef(0);
  useEffect(() => {
    const from = prev.current;
    const diff = target - from;
    if (diff === 0) return;
    const steps    = Math.max(Math.abs(diff) * 2, 24);
    const interval = Math.min(600 / steps, 30);
    const step     = diff / steps;
    let i = 0;
    const t = setInterval(() => {
      i++;
      const next = from + step * i;
      if (i >= steps) { setVal(target); prev.current = target; clearInterval(t); }
      else setVal(Math.round(next));
    }, interval);
    return () => clearInterval(t);
  }, [target]);
  return val;
}

/* ─── ANIMATED BACKGROUND ────────────────────────────────────── */
function AnimatedBg({ variant }) {
  if (variant === 'login') return null; // pure black, no effects
  return (
    <div className="bg-wrap">
      <div className="orb orb-app1"/>
      <div className="orb orb-app2"/>
    </div>
  );
}

/* ─── ICONS ──────────────────────────────────────────────────── */
const Icon = ({ d, size=18 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
    {d}
  </svg>
);
const GridIcon  = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>;
const ListIcon  = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>;
const PlusIcon  = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>;
const PenIcon   = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
const TrashIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>;
const GripIcon  = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="5" r="2"/><circle cx="15" cy="5" r="2"/><circle cx="9" cy="12" r="2"/><circle cx="15" cy="12" r="2"/><circle cx="9" cy="19" r="2"/><circle cx="15" cy="19" r="2"/></svg>;

/* ─── LOGIN PAGE ─────────────────────────────────────────────── */
function LoginPage({ onLogin }) {
  const [user,    setUser]    = useState('');
  const [pass,    setPass]    = useState('');
  const [err,     setErr]     = useState('');
  const [loading, setLoading] = useState(false);
  const [shake,   setShake]   = useState(false);

  function submit(e) {
    e.preventDefault();
    if (!user.trim() || !pass) { triggerErr('Please fill in all fields.'); return; }
    setLoading(true);
    setTimeout(() => {
      const found = USERS.find(u => u.username === user.trim() && u.password === pass);
      if (found) { onLogin(); }
      else { setLoading(false); triggerErr('Wrong username or password.'); }
    }, 700);
  }

  function triggerErr(msg) {
    setErr(msg); setShake(true);
    setTimeout(() => setShake(false), 500);
    setTimeout(() => setErr(''), 3000);
  }

  return (
    <div className="login-page">
      <AnimatedBg variant="login"/>
      <div className={`login-card${shake ? ' shake' : ''}`}>

        {/* ── Left branding panel ── */}
        <div className="login-left">
          <div className="login-brand-wrap">
            <div className="login-big-num">100</div>
            <span className="login-vert">Before</span>
          </div>
        </div>

        {/* ── Right form panel ── */}
        <div className="login-right">
          <div>
            <h1 className="login-heading">Welcome Back</h1>
            <p className="login-sub">Enter your credentials to continue.</p>
          </div>
          <form className="login-form" onSubmit={submit}>
            <div className="login-field">
              <label>Username</label>
              <input type="text" value={user} onChange={e => setUser(e.target.value)}
                placeholder="Enter username" autoFocus/>
            </div>
            <div className="login-field">
              <label>Password</label>
              <input type="password" value={pass} onChange={e => setPass(e.target.value)}
                placeholder="Password"/>
            </div>
            {err && <p className="login-error">{err}</p>}
            <button className="login-btn" type="submit" disabled={loading}>
              {loading ? <span className="spinner"/> : 'Sign In'}
            </button>
          </form>
          <p className="login-footer-txt">100 Before · Personal Tracker</p>
        </div>

      </div>
    </div>
  );
}

/* ─── SETUP PAGE ─────────────────────────────────────────────── */
function SetupPage({ onDone }) {
  const [val, setVal] = useState('');
  const go = () => { const lbl = val.trim() || 'your journey'; saveLabel(lbl); onDone(lbl); };
  return (
    <div className="setup-page">
      <AnimatedBg variant="login"/>
      <div className="setup-card">
        <div className="setup-big-num">100</div>
        <h2 className="setup-title">Before what?</h2>
        <p className="setup-sub">Personalise your bucket list — complete the phrase below.</p>
        <div className="setup-row">
          <span className="setup-pre">100 Before</span>
          <input className="setup-inp" value={val} onChange={e => setVal(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && go()} placeholder="I turn 30" maxLength={40} autoFocus/>
        </div>
        <button className="btn-primary full" onClick={go}>Start My Journey →</button>
      </div>
    </div>
  );
}

/* ─── INTRO ──────────────────────────────────────────────────── */
function Intro({ label, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 1900); return () => clearTimeout(t); }, []);
  return (
    <div className="intro" onClick={onDone}>
      <div className="intro-content">
        <span className="intro-num">100</span>
        <span className="intro-word">Before {label}</span>
      </div>
      <span className="intro-skip">Click to skip</span>
    </div>
  );
}

/* ─── PROGRESS RING ──────────────────────────────────────────── */
function Ring({ done }) {
  const offset = 150.8 - (done / 100) * 150.8;
  return (
    <div className="ring-wrap">
      <svg className="ring-svg" width="66" height="66" viewBox="0 0 66 66">
        <circle className="ring-bg"   cx="33" cy="33" r="24"/>
        <circle className="ring-fill" cx="33" cy="33" r="24" style={{ strokeDashoffset: offset }}/>
      </svg>
      <span className="ring-lbl">{done}%</span>
    </div>
  );
}

/* ─── SIDEBAR ────────────────────────────────────────────────── */
function Sidebar({ view, setView, goals, label }) {
  const done = goals.filter(g => g.done).length;
  const items = [
    { id:'dashboard', label:'Dashboard', icon:<GridIcon/> },
    { id:'goals',     label:'My Goals',  icon:<ListIcon/> },
    { id:'add',       label:'Add Goal',  icon:<PlusIcon/> },
  ];
  return (
    <aside className="sidebar">
      <div className="sidebar-logo">
        <span className="logo-num">100</span>
        <span className="logo-txt">{label || 'Before'}</span>
      </div>
      <nav className="sidebar-nav">
        {items.map(it => (
          <button key={it.id} className={`nav-btn${view === it.id ? ' active' : ''}`} onClick={() => setView(it.id)}>
            {it.icon}<span>{it.label}</span>
          </button>
        ))}
      </nav>
      <div className="sidebar-footer">
        <Ring done={done}/>
        <p className="sidebar-meta">{done} / 100 done</p>
      </div>
    </aside>
  );
}

/* ─── STAT CARD ──────────────────────────────────────────────── */
function StatCard({ value, label, delay = 0 }) {
  const num      = parseInt(String(value)) || 0;
  const suffix   = String(value).endsWith('%') ? '%' : '';
  const animated = useCountUp(num);
  return (
    <div className="stat-card" style={{ animationDelay: `${delay}ms` }}>
      <span className="stat-val">{animated}{suffix}</span>
      <span className="stat-lbl">{label}</span>
    </div>
  );
}

/* ─── GOAL ITEM ──────────────────────────────────────────────── */
function GoalItem({ goal, displayIdx, onToggle, onEdit, onDelete, dragHandlers }) {
  const due = goal.due ? formatDue(goal.due) : null;
  return (
    <div
      className="goal-item"
      id={`gi-${goal.id}`}
      style={{ animationDelay: `${Math.min(displayIdx * 35, 280)}ms` }}
      draggable
      onDragStart={() => dragHandlers.start(goal.id)}
      onDragOver={e  => { e.preventDefault(); dragHandlers.over(goal.id); }}
      onDrop={()     => dragHandlers.drop(goal.id)}
      onDragEnd={()  => dragHandlers.end()}
    >
      <div className="drag-handle"><GripIcon/></div>
      <button className={`goal-check${goal.done ? ' done-check' : ''}`} onClick={() => onToggle(goal.id)}
        style={goal.done ? { background:'#e8e8e8', borderColor:'#e8e8e8' } : {}}>
        {goal.done && (
          <svg viewBox="0 0 10 10" fill="none" stroke="#0a0a0a" strokeWidth="2" width="10" height="10">
            <polyline points="1,5 4,8.5 9,1.5"/>
          </svg>
        )}
      </button>
      <div className="goal-text" onClick={() => onToggle(goal.id)}>
        <div className={`goal-title-txt${goal.done ? ' done-title' : ''}`}
          style={goal.done ? { textDecoration:'line-through', color:'#666' } : {}}>{goal.title}</div>
        {goal.desc && <div className="goal-desc-txt" style={goal.done ? { color:'#555' } : {}}>{goal.desc}</div>}
        {due && <div className={`goal-due${due.overdue ? ' overdue' : ''}`}>{due.text}</div>}
      </div>
      <span className="goal-cat-tag">{goal.cat}</span>
      <span className="goal-num">#{String(displayIdx + 1).padStart(2,'0')}</span>
      <div className="goal-actions">
        <button className="goal-action-btn" title="Edit" onClick={() => onEdit(goal)}><PenIcon/></button>
        <button className="goal-action-btn del" title="Delete" onClick={() => onDelete(goal.id)}><TrashIcon/></button>
      </div>
    </div>
  );
}

/* ─── EDIT / LABEL MODAL ─────────────────────────────────────── */
function Modal({ title, onClose, children }) {
  return (
    <div className="modal-overlay" onClick={e => e.target.classList.contains('modal-overlay') && onClose()}>
      <div className="modal-card">
        <div className="modal-header">
          <span className="modal-title">{title}</span>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function EditGoalModal({ goal, onSave, onClose }) {
  const [title, setTitle] = useState(goal.title);
  const [desc,  setDesc]  = useState(goal.desc  || '');
  const [cat,   setCat]   = useState(goal.cat);
  const [due,   setDue]   = useState(goal.due   || '');
  const save = () => { if (!title.trim()) return; onSave({ ...goal, title:title.trim(), desc:desc.trim(), cat, due }); };
  return (
    <Modal title="Edit Goal" onClose={onClose}>
      <div className="form-group"><label>Goal Title</label>
        <input value={title} onChange={e => setTitle(e.target.value)} onKeyDown={e => e.key==='Enter' && save()} autoFocus maxLength={80}/>
      </div>
      <div className="form-group"><label>Description <span className="opt">(optional)</span></label>
        <textarea value={desc} onChange={e => setDesc(e.target.value)} rows={3}/>
      </div>
      <div className="form-group"><label>Category</label>
        <select value={cat} onChange={e => setCat(e.target.value)}>
          {CATS.map(c => <option key={c}>{c}</option>)}
        </select>
      </div>
      <div className="form-group"><label>Due Date <span className="opt">(optional)</span></label>
        <input type="date" value={due} onChange={e => setDue(e.target.value)}/>
      </div>
      <button className="btn-primary" onClick={save}>Save Changes</button>
    </Modal>
  );
}

function EditLabelModal({ current, onSave, onClose }) {
  const [val, setVal] = useState(current);
  const save = () => { const lbl = val.trim() || 'your journey'; saveLabel(lbl); onSave(lbl); };
  return (
    <Modal title="Update your goal" onClose={onClose}>
      <p style={{ color:'#aaa', fontSize:'15px' }}>What is this list "before"?</p>
      <div className="setup-row">
        <span className="setup-pre">100 Before</span>
        <input className="setup-inp" value={val} onChange={e => setVal(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && save()} maxLength={40} autoFocus/>
      </div>
      <button className="btn-primary" onClick={save}>Save</button>
    </Modal>
  );
}

/* ─── DASHBOARD VIEW ─────────────────────────────────────────── */
function DashboardView({ goals, label, onEditLabel, onExportJSON, onExportCSV, handlers }) {
  const total = goals.length;
  const done  = goals.filter(g => g.done).length;
  return (
    <div className="view-wrap">
      <header className="view-header">
        <div>
          <h1 className="view-title">Dashboard</h1>
          <p className="view-sub">Your journey at a glance</p>
          <button className="before-badge" onClick={onEditLabel}>
            100 Before <strong>{label}</strong>&nbsp; <PenIcon/>
          </button>
        </div>
        <div className="header-btns">
          <button className="btn-secondary" onClick={onExportJSON}>Export JSON</button>
          <button className="btn-secondary" onClick={onExportCSV}>Export CSV</button>
        </div>
      </header>
      <div className="stats-grid">
        <StatCard value={total}       label="Goals Added"  delay={0}/>
        <StatCard value={done}        label="Completed"    delay={60}/>
        <StatCard value={total - done} label="Pending"     delay={120}/>
        <StatCard value={done + '%'}  label="Progress"     delay={180}/>
      </div>
      <p className="section-title">Recently Added</p>
      <div className="goal-list">
        {goals.slice(0, 5).length === 0
          ? <p className="empty-hint">No goals yet — start adding your list!</p>
          : goals.slice(0, 5).map((g, i) =>
              <GoalItem key={g.id} goal={g} displayIdx={i} {...handlers}/>
            )
        }
      </div>
    </div>
  );
}

/* ─── GOALS VIEW ─────────────────────────────────────────────── */
function GoalsView({ goals, label, handlers }) {
  const [statusF, setStatusF] = useState('all');
  const [catF,    setCatF]    = useState('all');
  const filtered = useMemo(() =>
    goals.filter(g => {
      const sOk = statusF === 'all' || (statusF === 'done' ? g.done : !g.done);
      const cOk = catF === 'all' || g.cat === catF;
      return sOk && cOk;
    }), [goals, statusF, catF]);

  return (
    <div className="view-wrap">
      <header className="view-header">
        <div>
          <h1 className="view-title">My Goals</h1>
          <p className="view-sub">Everything you want to do before {label}</p>
        </div>
      </header>
      <div className="filter-bar">
        {[['all','All'],['pending','Pending'],['done','Completed']].map(([f,lbl]) => (
          <button key={f} className={`filter-btn${statusF === f ? ' active' : ''}`} onClick={() => setStatusF(f)}>{lbl}</button>
        ))}
        <div className="filter-sep"/>
        <select className="filter-select" value={catF} onChange={e => setCatF(e.target.value)}>
          <option value="all">All Categories</option>
          {CATS.map(c => <option key={c}>{c}</option>)}
        </select>
      </div>
      <div className="goal-list">
        {filtered.length === 0
          ? <div className="empty-state"><p>No goals match this filter.</p></div>
          : filtered.map((g, i) =>
              <GoalItem key={g.id} goal={g} displayIdx={goals.indexOf(g)} {...handlers}/>
            )
        }
      </div>
    </div>
  );
}

/* ─── ADD GOAL VIEW ──────────────────────────────────────────── */
function AddGoalView({ goals, onAdd }) {
  const [title, setTitle] = useState('');
  const [desc,  setDesc]  = useState('');
  const [cat,   setCat]   = useState('Adventure');
  const [due,   setDue]   = useState('');
  const [note,  setNote]  = useState(null);

  function handleAdd() {
    if (!title.trim())    { flash('Please enter a goal title.', 'err'); return; }
    if (goals.length >= 100) { flash('You already have 100 goals!', 'err'); return; }
    onAdd({ id: Date.now(), title: title.trim(), desc: desc.trim(), cat, due, done: false });
    setTitle(''); setDesc(''); setDue('');
    const left = 99 - goals.length;
    flash(left > 0 ? `Added! ${left} slot${left !== 1 ? 's' : ''} remaining.` : 'List complete!', 'ok');
  }

  function flash(msg, type) {
    setNote({ msg, type });
    setTimeout(() => setNote(null), 3500);
  }

  return (
    <div className="view-wrap">
      <header className="view-header">
        <div>
          <h1 className="view-title">Add a Goal</h1>
          <p className="view-sub">What's on your bucket list?</p>
        </div>
      </header>
      <div className="form-card">
        <div className="form-group">
          <label>Goal Title</label>
          <input value={title} onChange={e => setTitle(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleAdd()}
            placeholder="e.g. Watch a sunrise in Santorini" maxLength={80}/>
        </div>
        <div className="form-group">
          <label>Description <span className="opt">(optional)</span></label>
          <textarea value={desc} onChange={e => setDesc(e.target.value)}
            placeholder="Why does this matter to you?" rows={3}/>
        </div>
        <div className="form-group">
          <label>Category</label>
          <select value={cat} onChange={e => setCat(e.target.value)}>
            {CATS.map(c => <option key={c}>{c}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label>Due Date <span className="opt">(optional)</span></label>
          <input type="date" value={due} onChange={e => setDue(e.target.value)}/>
        </div>
        <button className="btn-primary" onClick={handleAdd}>Add to List</button>
        {note && <p className={`form-note ${note.type}`}>{note.msg}</p>}
      </div>
    </div>
  );
}

/* ─── TOAST ──────────────────────────────────────────────────── */
function Toast({ toast, onUndo }) {
  return (
    <div className={`toast${toast ? ' show' : ''}`}>
      <span>{toast?.msg}</span>
      {toast?.canUndo && <button className="toast-undo" onClick={onUndo}>Undo</button>}
    </div>
  );
}

/* ─── APP ROOT ───────────────────────────────────────────────── */
function App() {
  const [screen,  setScreen]  = useState('login');
  const [goals,   setGoals]   = useState(() => JSON.parse(localStorage.getItem('100before') || '[]'));
  const [label,   setLabel]   = useState(() => localStorage.getItem('100before_label') || '');
  const [view,    setView]    = useState('dashboard');
  const [editing, setEditing] = useState(null);
  const [showLbl, setShowLbl] = useState(false);
  const [toast,   setToast]   = useState(null);

  const toastTimer  = useRef(null);
  const deletedRef  = useRef(null);
  const dragSrcRef  = useRef(null);

  /* ── Persistence ── */
  function sync(next) { setGoals(next); saveGoals(next); }

  /* ── Auth flow ── */
  function onLogin() { label ? setScreen('intro') : setScreen('setup'); }
  function onSetupDone(lbl) { setLabel(lbl); setScreen('intro'); }
  function onIntroDone()    { setScreen('app'); }

  /* ── Goals CRUD ── */
  function addGoal(g)    { sync([g, ...goals]); }
  function toggleGoal(id){ sync(goals.map(g => g.id === id ? { ...g, done: !g.done } : g)); }
  function saveEdit(upd) { sync(goals.map(g => g.id === upd.id ? upd : g)); setEditing(null); flash('Goal updated!'); }
  function deleteGoal(id){
    const idx = goals.findIndex(g => g.id === id);
    deletedRef.current = { goal: goals[idx], idx };
    sync(goals.filter(g => g.id !== id));
    flash('Goal deleted', true);
  }
  function undoDelete(){
    if (!deletedRef.current) return;
    const { goal, idx } = deletedRef.current;
    const next = [...goals]; next.splice(idx, 0, goal);
    deletedRef.current = null;
    sync(next); hideToast(); flash('Goal restored!');
  }

  /* ── Label ── */
  function onSaveLabel(lbl) { setLabel(lbl); setShowLbl(false); flash('Updated!'); }

  /* ── Export ── */
  function dlBlob(blob, name) {
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = name; a.click(); URL.revokeObjectURL(a.href);
    flash('Download started!');
  }
  function exportJSON() { dlBlob(new Blob([JSON.stringify({ label, goals }, null, 2)], { type:'application/json' }), '100before.json'); }
  function exportCSV() {
    const rows = [['#','Title','Description','Category','Due','Completed']];
    goals.forEach((g,i) => rows.push([i+1, g.title, g.desc||'', g.cat, g.due||'', g.done?'Yes':'No']));
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    dlBlob(new Blob([csv], { type:'text/csv' }), '100before.csv');
  }

  /* ── Toast ── */
  function flash(msg, canUndo = false) {
    clearTimeout(toastTimer.current);
    setToast({ msg, canUndo });
    toastTimer.current = setTimeout(hideToast, 4500);
  }
  function hideToast() { setToast(null); }

  /* ── Drag & drop ── */
  function dragStart(id)  { dragSrcRef.current = id; }
  function dragOver(id)   {
    const src = dragSrcRef.current; if (!src || src === id) return;
    document.querySelectorAll('.goal-item').forEach(el => el.classList.remove('drag-over'));
    document.getElementById('gi-' + id)?.classList.add('drag-over');
  }
  function dragEnd() {
    document.querySelectorAll('.goal-item').forEach(el => el.classList.remove('drag-over'));
    dragSrcRef.current = null;
  }
  function dragDrop(targetId) {
    const srcId = dragSrcRef.current; // capture BEFORE dragEnd clears it
    document.querySelectorAll('.goal-item').forEach(el => el.classList.remove('drag-over'));
    if (!srcId || srcId === targetId) return;
    const si = goals.findIndex(g => g.id === srcId);
    const ti = goals.findIndex(g => g.id === targetId);
    if (si === -1 || ti === -1) return;
    const next = [...goals]; const [rm] = next.splice(si, 1); next.splice(ti, 0, rm);
    sync(next);
  }

  const dragHandlers = { onToggle: toggleGoal, onEdit: setEditing, onDelete: deleteGoal,
    dragHandlers: { start: dragStart, over: dragOver, drop: dragDrop, end: dragEnd } };

  /* ── Screens ── */
  if (screen === 'login') return <LoginPage onLogin={onLogin}/>;
  if (screen === 'setup') return <SetupPage onDone={onSetupDone}/>;
  if (screen === 'intro') return <Intro label={label} onDone={onIntroDone}/>;

  return (
    <div className="app">
      <AnimatedBg variant="app"/>
      <Sidebar view={view} setView={setView} goals={goals} label={label}/>
      <main className="main">
        {view === 'dashboard' && (
          <DashboardView goals={goals} label={label}
            onEditLabel={() => setShowLbl(true)}
            onExportJSON={exportJSON} onExportCSV={exportCSV}
            handlers={dragHandlers}/>
        )}
        {view === 'goals' && (
          <GoalsView goals={goals} label={label} handlers={dragHandlers}/>
        )}
        {view === 'add' && (
          <AddGoalView goals={goals} onAdd={addGoal}/>
        )}
      </main>

      {editing  && <EditGoalModal  goal={editing} onSave={saveEdit} onClose={() => setEditing(null)}/>}
      {showLbl  && <EditLabelModal current={label} onSave={onSaveLabel} onClose={() => setShowLbl(false)}/>}
      <Toast toast={toast} onUndo={undoDelete}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
